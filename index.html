<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مطعم وجاتوه حلوان اخوان - قلقيلية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --red-deep:    #1a0000;
      --gold:        #ffd700;
      --white:       #ffffff;
      --red-vivid:   #cc1111;
      --red-bright:  #e63030;
      --text-muted:  #ffcca0;
    }

    /* استعادة الماوس الافتراضي وإلغاء التأثيرات */
    html { scroll-behavior: smooth; cursor: auto; }
    body { font-family: 'Tajawal', sans-serif; background: var(--red-deep); color: var(--white); overflow-x: hidden; }

    /* الإعلان الثابت على اليسار */
    .fixed-promo-left {
        position: fixed; left: 10px; top: 100px; width: 180px;
        z-index: 999; background: #000; padding: 10px;
        border: 2px solid var(--gold); border-radius: 15px; text-align: center;
        box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
    }
    .promo-img { width: 100%; border-radius: 8px; margin-bottom: 8px; }
    .promo-btn { display: block; background: var(--gold); color: #000; padding: 8px; border-radius: 8px; text-decoration: none; font-weight: 700; font-size: 14px; }
    @media (max-width: 600px) { .fixed-promo-left { width: 100px; top: 70px; } }

    /* بقية التنسيقات */
    #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0d0000; z-index: 999999; display: flex; flex-direction: column; justify-content: center; align-items: center; animation: forceHideLoader 2.5s forwards; }
    @keyframes forceHideLoader { 100% { opacity: 0; visibility: hidden; display: none; } }
    .loader-logo { font-size: 40px; font-weight: 900; color: var(--gold); margin-bottom: 20px; }
    
    header { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(26, 0, 0, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,215,0,0.2); }
    nav { padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
    .nav-logo { font-size: 18px; font-weight: 900; color: var(--gold); }
    .nav-links { display: flex; gap: 20px; list-style: none; }
    .nav-links a { color: #fff; text-decoration: none; font-size: 14px; }
    .nav-order-btn { background: var(--gold); color: #000; padding: 5px 15px; border-radius: 20px; font-weight: 700; }

    .hero { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 100px 20px; }
    .hero-title { font-size: 50px; font-weight: 900; color: #fff; }
    .hero-title .gold { color: var(--gold); }
    
    .section { max-width: 900px; margin: 0 auto; padding: 50px 20px; }
    .section-title { font-size: 32px; font-weight: 900; text-align: center; margin-bottom: 30px; }
    
    .order-container { background: #2d0000; padding: 30px; border-radius: 20px; border: 1px solid var(--gold); }
    .form-group { margin-bottom: 20px; }
    .form-input, .form-select { width: 100%; padding: 12px; border-radius: 10px; border: none; }
    .submit-order-btn { width: 100%; background: var(--gold); padding: 15px; border-radius: 10px; border: none; font-weight: 900; cursor: pointer; }

    footer { background: #000; padding: 30px; text-align: center; }
  </style>
</head>
<body>

<div id="loader">
  <div class="loader-logo">🔥 حلوان اخوان</div>
</div>

<!-- الإعلان الثابت على اليسار -->
<div class="fixed-promo-left">
    <img src="https://i.ibb.co/6R2N7bY1/IMG-20240905-WA0001.jpg" alt="عرض" class="promo-img">
    <a href="#order-online" class="promo-btn">اطلب الآن</a>
</div>

<header>
  <nav>
    <div class="nav-logo">🔥 حلوان اخوان</div>
    <ul class="nav-links">
      <li><a href="#chicken">دجاج</a></li>
      <li><a href="#order-online" class="nav-order-btn">🛒 اطلب</a></li>
    </ul>
  </nav>
</header>

<section class="hero">
  <h1 class="hero-title">مطعم <span class="gold">وجاتوه</span><br>حلوان اخوان</h1>
  <p>قلقيلية — شارع الملعب</p>
</section>

<div id="order-online" class="section">
  <h2 class="section-title">اختر وجبتك</h2>
  <div class="order-container">
    <form id="custom-order-form">
        <div class="form-group">
          <input type="text" id="custName" class="form-input" placeholder="الاسم الكريم..." required>
        </div>
        <div class="form-group">
          <select id="mealType" class="form-select">
            <option value="بيتا دجاج">بيتا دجاج</option>
            <option value="بجيت دجاج">بجيت دجاج</option>
          </select>
        </div>
        <button type="submit" class="submit-order-btn">إرسال الطلب</button>
    </form>
  </div>
</div>

<footer>
  <p>جميع الحقوق محفوظة © 2026</p>
</footer>

<script>
    // كود إرسال الطلب
    document.getElementById('custom-order-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const name = document.getElementById('custName').value;
      const meal = document.getElementById('mealType').value;
      const waLink = `https://wa.me/972599100513?text=طلب جديد من: ${name} - الوجبة: ${meal}`;
      window.location.href = waLink;
    });
</script>

</body>
</html>
