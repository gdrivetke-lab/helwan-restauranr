<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم وجاتوه حلوان اخوان - قلقيلية</title>
    <meta name="description" content="مطعم وجاتوه حلوان اخوان قلقيلية - شاورما دجاج، شاورما حبش، بيتا، توست، مشروبات، جاتوهات لكافة المناسبات">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
          --red-deep:    #1a0000;
          --red-dark:    #2d0000;
          --red-mid:     #8b0000;
          --red-vivid:   #cc1111;
          --red-bright:  #e63030;
          --gold:        #ffd700;
          --cream:       #fff8e7;
          --white:       #ffffff;
          --text-muted:  #ffcca0;
        }

        html { scroll-behavior: smooth; cursor: none; -webkit-tap-highlight-color: transparent; }

        body {
          font-family: 'Tajawal', sans-serif; background: var(--red-deep);
          color: var(--white); overflow-x: hidden; user-select: none;
        }

        /* ===== شاشة التحميل السينمائية الملتهبة ===== */
        #loader {
          position: fixed; top: 0; left: 0; width: 100%; height: 100%;
          background: #0d0000; z-index: 999999;
          display: flex; flex-direction: column; justify-content: center; align-items: center;
          animation: forceHideLoader 2.5s forwards;
          pointer-events: none;
        }

        @keyframes forceHideLoader {
          0%, 80% { opacity: 1; visibility: visible; pointer-events: all; }
          100% { opacity: 0; visibility: hidden; pointer-events: none; display: none; }
        }

        .loader-logo { font-size: 40px; font-weight: 900; color: var(--gold); animation: gold-glow 1.5s ease-in-out infinite alternate, float 2s ease-in-out infinite; margin-bottom: 20px; }
        .fire-text { font-family: 'Tajawal', sans-serif; font-size: clamp(22px, 5vw, 42px); font-weight: 900; color: #fffbdd; text-align: center; padding: 0 15px; letter-spacing: 1px; animation: wood-fire 0.6s infinite alternate ease-in-out; }
        @keyframes wood-fire {
          0% { text-shadow: 0 2px 4px rgba(255, 255, 255, 0.8), 0 -2px 10px rgba(255, 179, 71, 0.8), 0 -6px 15px rgba(255, 68, 0, 0.8), 0 -10px 20px rgba(204, 17, 17, 0.8); transform: scale(1); }
          100% { text-shadow: 0 2px 6px rgba(255, 255, 255, 1), 0 -5px 15px rgba(255, 179, 71, 1), 0 -12px 25px rgba(255, 68, 0, 1), 0 -18px 35px rgba(204, 17, 17, 1), 0 -22px 45px rgba(139, 0, 0, 0.8); transform: scale(1.02); }
        }

        /* ===== شريط التقدم & العروض ===== */
        #scroll-progress { position: fixed; top: 0; left: 0; height: 3px; background: linear-gradient(90deg, var(--red-vivid), var(--gold), #ffffff); z-index: 10000; width: 0%; box-shadow: 0 0 10px var(--gold); transition: width 0.1s; }
        .marquee-container { background: rgba(255, 215, 0, 0.1); border-bottom: 1px solid rgba(255,215,0,0.2); color: var(--gold); font-size: 14px; font-weight: 700; padding: 8px 0; overflow: hidden; white-space: nowrap; position: relative; }
        .marquee-text { display: inline-block; padding-left: 100%; animation: marquee 25s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(100%); } }

        /* ===== الأزرار العائمة & النفحات ===== */
        .fab-islamic { position: fixed; bottom: 24px; right: 24px; width: 60px; height: 60px; background: linear-gradient(135deg, #28a745, #1e7e34); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 28px; color: white; border: none; cursor: pointer; z-index: 9000; box-shadow: 0 4px 15px rgba(40, 167, 69, 0.5); animation: pulse-green-islamic 2.5s infinite; transition: transform 0.3s; }
        .fab-islamic:active { transform: scale(0.9); }
        @keyframes pulse-green-islamic { 0% { box-shadow: 0 0 0 0 rgba(40, 167, 69, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(40, 167, 69, 0); } 100% { box-shadow: 0 0 0 0 rgba(40, 167, 69, 0); } }

        .islamic-modal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.85); z-index: 100000; display: none; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.4s ease; }
        .islamic-modal.active { display: flex; opacity: 1; }
        .islamic-content { background: linear-gradient(135deg, #1a0000, #2d0000); border: 2px solid var(--gold); border-radius: 20px; padding: 40px 30px; text-align: center; max-width: 90%; width: 450px; transform: scale(0.8); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 10px 40px rgba(255,215,0,0.3); position: relative; }
        .islamic-modal.active .islamic-content { transform: scale(1); }
        .close-islamic { position: absolute; top: 15px; right: 20px; color: var(--gold); font-size: 32px; cursor: pointer; font-weight: bold; transition: transform 0.2s; }
        .close-islamic:active { transform: scale(0.8); }
        .islamic-icon { font-size: 55px; margin-bottom: 20px; animation: float 3s ease-in-out infinite; }
        .islamic-text { font-size: 24px; color: var(--white); line-height: 1.8; font-weight: 700; text-shadow: 0 2px 10px rgba(255,215,0,0.3); }

        /* ===== تأثيرات اللمس ===== */
        .touch-spark { position: absolute; width: 5px; height: 5px; background: var(--gold); border-radius: 50%; pointer-events: none; z-index: 9999; box-shadow: 0 0 8px var(--gold); animation: spark-fall 0.8s ease-out forwards; }
        @keyframes spark-fall { 0% { transform: scale(1.5) translateY(0); opacity: 1; } 100% { transform: scale(0) translateY(40px); opacity: 0; } }
        .ripple { position: absolute; border-radius: 50%; background: rgba(255, 215, 0, 0.4); transform: scale(0); animation: ripple-anim 0.6s linear; pointer-events: none; }
        @keyframes ripple-anim { to { transform: scale(4); opacity: 0; } }
        .confetti { position: fixed; width: 10px; height: 10px; pointer-events: none; z-index: 99999; animation: confetti-fall 2.5s ease-out forwards; }
        @keyframes confetti-fall { 0% { transform: translateY(-100px) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }

        /* ===== تكبير الصور ===== */
        .zoom-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); z-index: 99998; display: none; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.3s; cursor: zoom-out; }
        .zoom-overlay.active { display: flex; opacity: 1; }
        .zoomed-img { max-width: 90%; max-height: 90%; border-radius: 20px; box-shadow: 0 10px 40px rgba(255,215,0,0.3); transform: scale(0.5); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .zoom-overlay.active .zoomed-img { transform: scale(1); }

        /* ===== الماوس السحري ===== */
        #magic-cursor, #cursor-trail { display: none; }
        @media (pointer: fine) { #magic-cursor { display: block; position: fixed; top: 0; left: 0; width: 8px; height: 8px; background: var(--gold); border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); box-shadow: 0 0 15px 4px rgba(255, 215, 0, 0.6); transition: width 0.2s, height 0.2s; } #cursor-trail { display: block; position: fixed; top: 0; left: 0; width: 30px; height: 30px; border: 1px solid rgba(255, 215, 0, 0.5); border-radius: 50%; pointer-events: none; z-index: 9998; transform: translate(-50%, -50%); transition: top 0.1s ease-out, left 0.1s ease-out, width 0.2s, height 0.2s; } }

        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-12px); } 100% { transform: translateY(0px); } }
        @keyframes text-gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes gold-glow { 0% { text-shadow: 0 0 4px rgba(255,215,0,0.2); } 100% { text-shadow: 0 0 15px rgba(255,215,0,0.8); } }

        /* ===== NAV ===== */
        header { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(26, 0, 0, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,215,0,0.2); transition: all 0.4s ease; }
        nav { padding: 14px 32px; display: flex; align-items: center; justify-content: space-between; }
        .nav-logo { font-size: 17px; font-weight: 900; color: var(--gold); display: flex; align-items: center; gap: 8px; text-shadow: 0 0 8px rgba(255,215,0,0.4); }
        .nav-links { display: flex; gap: 24px; list-style: none; }
        .nav-links a { text-decoration: none; color: rgba(255,255,255,0.8); font-size: 15px; font-weight: 500; transition: color 0.3s; padding-bottom: 2px; border-bottom: 2px solid transparent; cursor: pointer; }
        .nav-links a:hover, .nav-links a:active { color: var(--gold); border-bottom-color: var(--gold); }
        .nav-order-btn { background: var(--gold); color: #1a0000 !important; padding: 4px 12px; border-radius: 20px; font-weight: 700 !important; border: none !important; box-shadow: 0 0 10px rgba(255,215,0,0.4); }

        /* ===== HERO ===== */
        .hero { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 140px 24px 60px; position: relative; overflow: hidden; background: radial-gradient(ellipse at 25% 30%, rgba(204,17,17,0.4) 0%, transparent 55%), radial-gradient(ellipse at 75% 70%, rgba(255,179,71,0.15) 0%, transparent 50%), radial-gradient(ellipse at 50% 10%, rgba(139,0,0,0.5) 0%, transparent 50%), linear-gradient(180deg, #2d0000 0%, #1a0000 100%); }
        .fire-particle { position: absolute; width: 4px; height: 4px; border-radius: 50%; pointer-events: none; animation: rise linear infinite; background: var(--gold); }
        @keyframes rise { 0% { transform: translateY(0) scale(1); opacity: 0.9; } 100% { transform: translateY(-120px) scale(0); opacity: 0; } }
        .hero-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(255,215,0,0.1); backdrop-filter: blur(4px); border: 1px solid rgba(255,215,0,0.4); border-radius: 40px; padding: 7px 20px; font-size: 13px; color: var(--gold); font-weight: 700; margin-bottom: 22px; position: relative; z-index: 2; box-shadow: 0 0 20px rgba(255,215,0,0.2); }
        .hero-title { font-size: clamp(30px, 8vw, 58px); font-weight: 900; line-height: 1.1; color: var(--white); position: relative; z-index: 2; text-shadow: 0 4px 24px rgba(0,0,0,0.6); }
        .hero-title .gold { color: var(--gold); display: inline-block; animation: gold-glow 3s ease-in-out infinite; }
        .hero-title .red { background: linear-gradient(90deg, #ff3333, #ffaa00, #ff3333); background-size: 200% auto; color: transparent; -webkit-background-clip: text; background-clip: text; animation: text-gradient 3s linear infinite; }
        .hero-location { font-size: 15px; color: var(--text-muted); margin-top: 14px; position: relative; z-index: 2; }
        .hero-location a { color: inherit; text-decoration: none; transition: color 0.3s; }
        .hero-divider { width: 100px; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 24px auto; position: relative; z-index: 2; }
        .hero-sub { font-size: 18px; color: rgba(255,255,255,0.85); line-height: 1.8; position: relative; z-index: 2; }

        .hero-cta { margin-top: 36px; display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; position: relative; z-index: 2; }
        .btn-primary, .btn-call, .btn-islamic-hero { position: relative; overflow: hidden; display: inline-flex; align-items: center; gap: 10px; font-family: 'Tajawal', sans-serif; font-size: 17px; font-weight: 700; padding: 15px 38px; border-radius: 60px; text-decoration: none; transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; border: none; }
        .btn-primary { background: linear-gradient(135deg, #ffd700, #ffb347); color: #1a0000; box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4); }
        .btn-islamic-hero { background: linear-gradient(135deg, #28a745, #1e7e34); color: #fff; animation: pulse-green-islamic 2.5s infinite; box-shadow: 0 4px 15px rgba(40, 167, 69, 0.4); }
        .btn-call { background: rgba(255, 215, 0, 0.05); backdrop-filter: blur(5px); color: var(--gold); border: 2px solid var(--gold); }
        .btn-primary:active, .btn-call:active, .btn-islamic-hero:active { transform: scale(0.92); }

        /* ===== SECTIONS ===== */
        .section { max-width: 960px; margin: 0 auto; padding: 70px 24px; }
        .section-header { text-align: center; margin-bottom: 44px; }
        .eyebrow { font-size: 12px; font-weight: 700; letter-spacing: 3px; color: var(--gold); text-transform: uppercase; display: block; margin-bottom: 10px; }
        .section-title { font-size: clamp(22px, 5vw, 36px); font-weight: 900; color: var(--white); }
        .section-title span { color: var(--red-bright); }
        .title-bar { width: 60px; height: 3px; background: linear-gradient(90deg, var(--red-vivid), var(--gold)); border-radius: 2px; margin: 14px auto 0; }

        /* ===== ORDER ONLINE FORM ===== */
        .order-bg { background: linear-gradient(180deg, #110000 0%, #1a0000 100%); border-top: 1px solid rgba(255,215,0,0.15); }
        .order-container { background: rgba(30, 0, 0, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255,215,0,0.2); border-radius: 24px; padding: 32px 24px; box-shadow: 0 15px 40px rgba(0,0,0,0.5); max-width: 700px; margin: 0 auto; }
        .form-group { margin-bottom: 24px; text-align: right; }
        .form-label { display: block; font-size: 15px; font-weight: 700; color: var(--gold); margin-bottom: 10px; }
        .form-input, .form-select, .form-textarea { width: 100%; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255,215,0,0.3); border-radius: 12px; padding: 14px 16px; color: var(--white); font-family: 'Tajawal', sans-serif; font-size: 16px; outline: none; }
        .form-select optgroup { background: #2d0000; color: var(--gold); }
        .form-select option { background: #1a0000; color: var(--white); }

        .salads-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 12px; }
        .salad-option { display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); padding: 10px 14px; border-radius: 10px; cursor: pointer; user-select: none; }
        .salad-option input[type="checkbox"] { display: none; }
        .custom-checkbox { width: 20px; height: 20px; border: 2px solid rgba(255,215,0,0.5); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
        .salad-option input[type="checkbox"]:checked + .custom-checkbox { background: var(--gold); border-color: var(--gold); }
        .salad-option input[type="checkbox"]:checked + .custom-checkbox::after { content: '✔'; color: #1a0000; font-size: 14px; font-weight: bold; }
        .salad-option input[type="checkbox"]:checked ~ .salad-name { color: var(--gold); font-weight: 700; }
        .salad-name { font-size: 14px; color: rgba(255,255,255,0.8); }
        .submit-order-btn { width: 100%; background: linear-gradient(135deg, #ffd700, #ffb347); color: #1a0000; font-size: 18px; font-weight: 900; border: none; border-radius: 14px; padding: 18px; cursor: pointer; font-family: 'Tajawal', sans-serif; }

        /* ===== MENU GRID & CARDS ===== */
        .menu-bg { background: linear-gradient(180deg, #200000 0%, #1a0000 100%); border-top: 1px solid rgba(255,215,0,0.15); border-bottom: 1px solid rgba(255,215,0,0.15); }
        .category-row { margin-bottom: 52px; }
        .items-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; justify-items: center; }

        .food-card { background: linear-gradient(160deg, rgba(80,0,0,0.4), rgba(30,0,0,0.8)); border: 1px solid rgba(255,215,0,0.15); border-radius: 20px; overflow: hidden; width: 100%; max-width: 280px; position: relative; cursor: pointer; }
        .food-img-wrap { position: relative; width: 100%; height: 190px; overflow: hidden; background: #110000; }
        .food-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .food-info { padding: 18px 16px 20px; text-align: center; }
        .food-name { font-size: 18px; font-weight: 700; color: var(--white); margin-bottom: 6px; }
        .food-desc { font-size: 13px; color: var(--text-muted); line-height: 1.6; }
        .food-price { display: inline-block; background: rgba(255, 215, 0, 0.15); color: var(--gold); padding: 4px 12px; border-radius: 20px; font-weight: 900; font-size: 15px; margin-top: 8px; border: 1px solid rgba(255, 215, 0, 0.3); }

        /* ===== CAKES ===== */
        .cake-bg { background: linear-gradient(180deg, #1a0000 0%, #220000 100%); }
        .cake-card { max-width: 680px; margin: 0 auto; background: linear-gradient(135deg, rgba(139,0,0,0.4), rgba(45,0,0,0.7)); border: 1px solid rgba(255,215,0,0.3); border-radius: 28px; overflow: hidden; box-shadow: 0 15px 45px rgba(0,0,0,0.6); cursor: pointer; }
        .cake-img-wrap { width: 100%; height: 320px; overflow: hidden; }
        .cake-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .cake-body { padding: 32px 28px; text-align: center; }
        .cake-body h3 { font-size: 26px; font-weight: 900; color: var(--gold); margin-bottom: 12px; }
        .cake-body p { font-size: 16px; color: rgba(255,255,255,0.9); line-height: 1.9; }
        .cake-body .hl { color: var(--red-bright); font-weight: 700; }

        /* ===== CONTACT ===== */
        .contact-bg { background: linear-gradient(180deg, #1a0000 0%, #0d0000 100%); border-top: 1px solid rgba(255,215,0
